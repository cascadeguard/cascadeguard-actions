# CascadeGuard — Reusable Release Workflow
#
# Encapsulates the full release pipeline: multi-platform build, dual-registry
# push, vulnerability scan, SBOM generation, cosign signing, SLSA attestation,
# and GitHub Release creation. The image matrix is generated at runtime from
# images.yaml — no hardcoded image list.
#
# Callers provide registry prefixes and optional tool versions via inputs.
# Secrets (DOCKERHUB_USERNAME, DOCKERHUB_TOKEN) are inherited from the caller.

name: Release

on:
  workflow_call:
    inputs:
      image-prefix-ghcr:
        description: 'GHCR image prefix (e.g. ghcr.io/cascadeguard)'
        type: string
        required: true
      image-prefix-dockerhub:
        description: 'Docker Hub image prefix (e.g. cascadeguard)'
        type: string
        required: true
      grype-config:
        description: 'Path to Grype config file (empty string to skip)'
        type: string
        required: false
        default: ''
      platforms:
        description: 'Target platforms for multi-arch builds'
        type: string
        required: false
        default: 'linux/amd64,linux/arm64'
      grype-version:
        description: 'Grype version to install'
        type: string
        required: false
        default: 'v0.110.0'
      syft-version:
        description: 'Syft version to install'
        type: string
        required: false
        default: 'v1.42.3'

permissions:
  contents: write
  packages: write
  id-token: write
  security-events: write
  attestations: write    # Required for SLSA provenance attestation

jobs:
  # ── Matrix Generation ────────────────────────────────────────────
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate release matrix from images.yaml
        id: matrix
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          with open('images.yaml') as f:
              images = yaml.safe_load(f)

          include = []
          for img in images:
              # Derive context dir from dockerfile: "images/python/3.12/Dockerfile" -> "images/python/3.12"
              context = '/'.join(img['dockerfile'].split('/')[:-1])
              include.append({
                  'context': context,
                  'name': img['image'],
                  'tag': img['tag'],
              })

          matrix = json.dumps({'include': include})
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'matrix={matrix}\n')
          print(f'Release matrix: {[e["name"] for e in include]}')
          PYEOF

  release:
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      # ── Registry Authentication ──────────────────────────────────
      - name: Derive GHCR registry from image prefix
        id: registries
        run: |
          # Extract registry host from image-prefix-ghcr (e.g. "ghcr.io/cascadeguard" -> "ghcr.io")
          GHCR_REGISTRY=$(echo "${{ inputs.image-prefix-ghcr }}" | cut -d'/' -f1)
          echo "ghcr=$GHCR_REGISTRY" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ steps.registries.outputs.ghcr }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Prepare Build Context ────────────────────────────────────
      - name: Extract release version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Copy shared scripts into build context
        run: cp -r shared ${{ matrix.context }}/shared

      # ── Build Multi-Platform Images ─────────────────────────────
      - name: Build and push image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.context }}/Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ${{ inputs.image-prefix-ghcr }}/${{ matrix.name }}:${{ matrix.tag }}
            ${{ inputs.image-prefix-ghcr }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ inputs.image-prefix-ghcr }}/${{ matrix.name }}:latest
            ${{ inputs.image-prefix-dockerhub }}/${{ matrix.name }}:${{ matrix.tag }}
            ${{ inputs.image-prefix-dockerhub }}/${{ matrix.name }}:${{ steps.version.outputs.version }}
            ${{ inputs.image-prefix-dockerhub }}/${{ matrix.name }}:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Scan ────────────────────────────────────────────────────
      - name: Install Grype
        uses: cascadeguard/cascadeguard-actions/setup-grype@d618b14ba0316b803ea98c1808d5b6392c97d5e1 # CAS-94
        with:
          version: ${{ inputs.grype-version }}

      - name: Scan released image
        run: |
          IMAGE="${{ inputs.image-prefix-ghcr }}/${{ matrix.name }}:${{ matrix.tag }}"
          GRYPE_ARGS=()
          if [ -n "${{ inputs.grype-config }}" ]; then
            GRYPE_ARGS+=(--config "${{ inputs.grype-config }}")
          fi

          grype "$IMAGE" \
            "${GRYPE_ARGS[@]}" \
            --fail-on critical

      # ── SBOM ────────────────────────────────────────────────────
      - name: Install Syft
        uses: cascadeguard/cascadeguard-actions/setup-syft@d618b14ba0316b803ea98c1808d5b6392c97d5e1 # CAS-94
        with:
          version: ${{ inputs.syft-version }}

      - name: Generate SBOM
        run: |
          syft "${{ inputs.image-prefix-ghcr }}/${{ matrix.name }}:${{ matrix.tag }}" \
            --output spdx-json=sbom-${{ matrix.name }}.spdx.json \
            --output cyclonedx-json=sbom-${{ matrix.name }}.cyclonedx.json

      # ── Sign ────────────────────────────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Sign image and attach SBOM attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign on GHCR
          cosign sign --yes \
            -a "version=${{ steps.version.outputs.version }}" \
            -a "repo=${{ github.repository }}" \
            "${{ inputs.image-prefix-ghcr }}/${{ matrix.name }}:${{ matrix.tag }}"

          # Attach SBOM attestation on GHCR
          cosign attest --yes \
            --predicate sbom-${{ matrix.name }}.spdx.json \
            --type spdxjson \
            "${{ inputs.image-prefix-ghcr }}/${{ matrix.name }}:${{ matrix.tag }}"

          # Attach SBOM as OCI artifact on GHCR (discoverable via cosign download sbom)
          cosign attach sbom \
            --sbom sbom-${{ matrix.name }}.spdx.json \
            --type spdx \
            "${{ inputs.image-prefix-ghcr }}/${{ matrix.name }}:${{ matrix.tag }}"

          # Sign on Docker Hub
          cosign sign --yes \
            -a "version=${{ steps.version.outputs.version }}" \
            -a "repo=${{ github.repository }}" \
            "${{ inputs.image-prefix-dockerhub }}/${{ matrix.name }}:${{ matrix.tag }}"

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ inputs.image-prefix-ghcr }}/${{ matrix.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-release-${{ matrix.name }}
          path: |
            sbom-${{ matrix.name }}.spdx.json
            sbom-${{ matrix.name }}.cyclonedx.json

      - name: Clean up build context
        if: always()
        run: rm -rf ${{ matrix.context }}/shared

  # ── Create GitHub Release ──────────────────────────────────────
  create-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download all SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sbom-release-*
          path: sboms/
          merge-multiple: true

      - name: Build release body from images.yaml
        id: release-body
        run: |
          python3 - <<'PYEOF'
          import yaml, json, os

          with open('images.yaml') as f:
              images = yaml.safe_load(f)

          owner = os.environ['REPO_OWNER']
          ref_name = os.environ['REF_NAME']
          repo = os.environ['REPO']
          image_prefix_ghcr = os.environ['IMAGE_PREFIX_GHCR']
          image_prefix_dockerhub = os.environ['IMAGE_PREFIX_DOCKERHUB']

          rows = []
          first_image = None
          for img in images:
              name = img['image']
              tag = img['tag']
              if first_image is None:
                  first_image = f'{name}:{tag}'
              rows.append(
                  f'| {name}:{tag} | `{image_prefix_ghcr}/{name}:{tag}` | `{image_prefix_dockerhub}/{name}:{tag}` |'
              )

          lines = [
              f'## CascadeGuard Secure Base Images {ref_name}',
              '',
              '### Images published',
              '| Image | GHCR | Docker Hub |',
              '|-------|------|------------|',
              '\n'.join(rows),
              '',
              '### Security',
              '- All images scanned with Grype (zero critical/high CVEs at release time)',
              '- Signed with cosign (keyless / Sigstore / Rekor transparency log)',
              '- SBOM attestations attached (SPDX + CycloneDX JSON)',
              '- SLSA Level 3 provenance attestations generated by GitHub Actions',
              '',
              '### Verify',
              '```bash',
              '# Verify cosign signature',
              f'cosign verify \\',
              f'  --certificate-identity-regexp "https://github.com/{repo}/.*" \\',
              f'  --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \\',
              f'  {image_prefix_ghcr}/{first_image}',
              '',
              '# Verify SLSA provenance',
              f'gh attestation verify oci://{image_prefix_ghcr}/{first_image} --owner {owner.split("/")[0] if "/" in owner else owner}',
              '```',
          ]

          with open('release-body.md', 'w') as f:
              f.write('\n'.join(lines) + '\n')
          print('Release body generated.')
          PYEOF
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          IMAGE_PREFIX_GHCR: ${{ inputs.image-prefix-ghcr }}
          IMAGE_PREFIX_DOCKERHUB: ${{ inputs.image-prefix-dockerhub }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v2
        with:
          generate_release_notes: true
          files: |
            sboms/*.spdx.json
            sboms/*.cyclonedx.json
          body_path: release-body.md
