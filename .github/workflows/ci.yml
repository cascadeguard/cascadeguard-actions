# CascadeGuard Actions — CI Workflow
#
# Runs on every PR and push to main. Validates workflow files with
# actionlint, YAML hygiene with yamllint, and runs the Python action tests.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.7"
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo mv /tmp/actionlint /usr/local/bin/actionlint

      - name: Run actionlint
        run: actionlint -color

      - name: Run yamllint
        run: |
          pip install --quiet yamllint
          yamllint scan-report/action.yml scan-issues/action.yml

  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install CascadeGuard CLI
        run: |
          pip install --quiet \
            "git+https://github.com/cascadeguard/cascadeguard.git@3371e21993926db2e3979974cda2cc08fec18022#subdirectory=app"

      - name: Install test dependencies
        run: pip install --quiet -e ".[test]"

      - name: Run tests
        run: pytest tests/ -v
