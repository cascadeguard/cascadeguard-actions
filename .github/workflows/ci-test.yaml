# cascadeguard-actions — Run unit tests on PR
#
# Internal CI workflow (not a reusable workflow).
# Runs lib/ and integration tests on every pull request.

name: Test

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet pytest pyyaml

      - name: Run tests
        run: python -m pytest lib/tests/ -v
