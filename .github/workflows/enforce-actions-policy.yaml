# CascadeGuard — Reusable Actions Policy Enforcement Workflow
#
# Audits all workflow files against .cascadeguard/actions-policy.yaml
# using the `cascadeguard actions audit` CLI command.

name: Enforce Actions Policy

on:
  workflow_call:
    inputs:
      policy_path:
        description: "Path to the actions-policy.yaml file"
        required: false
        default: ".cascadeguard/actions-policy.yaml"
        type: string
      workflows_dir:
        description: "Path to the directory containing workflow files to audit"
        required: false
        default: ".github/workflows"
        type: string
      cascadeguard_version:
        description: "cascadeguard PyPI version to install (e.g. '1.2.3' or 'latest')"
        required: false
        default: "latest"
        type: string

jobs:
  audit:
    name: Audit Actions Policy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install CascadeGuard
        run: |
          if [ "${{ inputs.cascadeguard_version }}" = "latest" ]; then
            pip install --quiet cascadeguard 2>/dev/null \
              || pip install --quiet "git+https://github.com/cascadeguard/cascadeguard.git@main#subdirectory=app"
          else
            pip install --quiet "cascadeguard==${{ inputs.cascadeguard_version }}"
          fi

      - name: Audit GitHub Actions policy
        run: |
          cascadeguard actions audit \
            --policy "${{ inputs.policy_path }}" \
            --workflows-dir "${{ inputs.workflows_dir }}"
