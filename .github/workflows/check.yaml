# CascadeGuard — Reusable Check Workflow
#
# Runs cascadeguard images check against enrolled images.
# The CLI handles all git operations: committing state files and
# opening PRs for Dockerfile promotions. This workflow just calls
# the CLI and reports the result.
#
# Behaviour is controlled by .cascadeguard.yaml in the calling repo:
#   check.state.destination: main | pr
#   check.promote.enabled: true | false
#   check.promote.destination: pr | main

name: Check

on:
  workflow_call:
    inputs:
      image:
        description: "Scope check to a single image name"
        type: string
        required: false
        default: ""
      format:
        description: "Output format: table or json"
        type: string
        required: false
        default: "table"
      no-promote:
        description: "Skip Dockerfile promotion regardless of config"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  packages: read
  issues: write
  pull-requests: write
  security-events: write

jobs:
  check:
    name: Check images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up CascadeGuard CLI
        uses: cascadeguard/cascadeguard-actions/setup-cascadeguard@main

      - name: Run cascadeguard images check
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ARGS=(--format "${{ inputs.format }}")
          if [ -n "${{ inputs.image }}" ]; then
            ARGS+=(--image "${{ inputs.image }}")
          fi
          if [ "${{ inputs.no-promote }}" = "true" ]; then
            ARGS+=(--no-promote)
          fi

          set +e
          cascadeguard images check "${ARGS[@]}"
          RC=$?
          set -e

          if [ "$RC" -eq 1 ]; then
            echo "has-drift=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.has-drift }}" = "true" ]; then
            echo "::warning::Image drift detected — state files updated"
          else
            echo "All images up to date"
          fi
