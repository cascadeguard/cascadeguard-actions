# CascadeGuard — Reusable Check Workflow
#
# Runs cascadeguard images check against enrolled images.
# Checks registries for digest drift, detects new upstream tags,
# updates state files, and commits changes.
#
# Replaces the separate scheduled-scan and check-upstream-tags workflows.

name: Check

on:
  workflow_call:
    inputs:
      cascadeguard-version:
        description: "CascadeGuard CLI version (git ref) to install"
        type: string
        required: false
        default: "main"
      image:
        description: "Scope check to a single image name"
        type: string
        required: false
        default: ""
      format:
        description: "Output format: table or json"
        type: string
        required: false
        default: "table"

permissions:
  contents: write
  packages: read
  issues: write
  security-events: write

jobs:
  check:
    name: Check images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install CascadeGuard CLI
        run: |
          pip install --quiet \
            "git+https://github.com/cascadeguard/cascadeguard.git@${{ inputs.cascadeguard-version }}#subdirectory=app"

      - name: Run cascadeguard images check
        id: check
        run: |
          ARGS=(--format "${{ inputs.format }}")
          if [ -n "${{ inputs.image }}" ]; then
            ARGS+=(--image "${{ inputs.image }}")
          fi

          set +e
          cascadeguard images check "${ARGS[@]}"
          RC=$?
          set -e

          if [ "$RC" -eq 1 ]; then
            echo "has-drift=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-drift=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit state changes
        run: |
          git config user.name "cascadeguard[bot]"
          git config user.email "cascadeguard[bot]@users.noreply.github.com"

          # Stage any state file changes
          git add .cascadeguard/ || true

          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            SCAN_DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore(state): update image state ${SCAN_DATE}

          Automated check run. State files updated for drift detection.

          Co-Authored-By: Paperclip <noreply@paperclip.ing>"
            git push origin main
          fi

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check.outputs.has-drift }}" = "true" ]; then
            echo "::warning::Image drift detected — state files updated"
          else
            echo "All images up to date"
          fi
