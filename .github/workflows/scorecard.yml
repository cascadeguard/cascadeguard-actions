# CascadeGuard Actions — OpenSSF Scorecard Workflow
#
# Runs weekly and on pushes to main. Publishes results to the GitHub
# Security tab and to api.securityscorecards.dev so the README badge
# stays current.
#
# Docs: https://github.com/ossf/scorecard-action

name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions: read-all

jobs:
  scorecard:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Publish results to OpenSSF for the README badge
          publish_results: true

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3.28.5
        with:
          sarif_file: scorecard-results.sarif
          wait-for-processing: true
