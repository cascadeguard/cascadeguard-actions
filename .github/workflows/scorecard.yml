# CascadeGuard Actions — OpenSSF Scorecard Workflow
#
# Runs weekly and on pushes to main. Publishes results to the GitHub
# Security tab and to api.securityscorecards.dev so the README badge
# stays current.
#
# Docs: https://github.com/ossf/scorecard-action

name: OpenSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: "0 8 * * 1"

permissions: read-all

jobs:
  scorecard:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # Publish results to OpenSSF for the README badge
          publish_results: true

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@b7bf0a3ed3ecfa44160715d7c442788f65f0f923 # v3.28.5
        with:
          sarif_file: scorecard-results.sarif
          wait-for-processing: true
