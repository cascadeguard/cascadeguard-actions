# CascadeGuard — Reusable Build, Scan, Test, Sign, and Push Workflow
#
# Called by ci.yaml for each image in the matrix.
# All pipeline inputs come from the caller.

name: Build Image

on:
  workflow_call:
    inputs:
      image_path:
        description: "Path under images/ (e.g., python/3.12)"
        required: true
        type: string
      image_name:
        description: "Image name in registry (e.g., python)"
        required: true
        type: string
      image_tag:
        description: "Image tag (e.g., 3.12-slim)"
        required: true
        type: string
      push_and_sign:
        description: "Whether to push and sign the image (false on PRs)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        if: inputs.push_and_sign
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set full image reference
        id: meta
        run: |
          FULL_IMAGE="${{ env.IMAGE_PREFIX }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Copy shared hardening scripts into build context
        run: |
          if [ -d shared ]; then
            cp -r shared images/${{ inputs.image_path }}/shared
          fi

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: images/${{ inputs.image_path }}
          file: images/${{ inputs.image_path }}/Dockerfile
          push: false
          load: true
          tags: ${{ steps.meta.outputs.full_image }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Scanning ─────────────────────────────────────────────────
      - name: Install Grype
        uses: cascadeguard/cascadeguard-actions/setup-grype@d618b14ba0316b803ea98c1808d5b6392c97d5e1 # CAS-94
        with:
          version: v0.110.0

      - name: Scan image with Grype
        run: |
          GRYPE_ARGS=("${{ steps.meta.outputs.full_image }}")
          if [ -f shared/scanning/grype-config.yaml ]; then
            GRYPE_ARGS+=(--config shared/scanning/grype-config.yaml)
          fi
          grype "${GRYPE_ARGS[@]}" \
            --output sarif=grype-results.sarif \
            --output json=grype-results.json

      - name: Upload Grype SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: grype-results.sarif
          category: grype-${{ inputs.image_name }}
        continue-on-error: true

      # ── Trivy (secondary scanner) ────────────────────────────────
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # master
        with:
          image-ref: ${{ steps.meta.outputs.full_image }}
          format: json
          output: trivy-results.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
        continue-on-error: true

      - name: Upload Trivy results artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-${{ inputs.image_name }}-${{ inputs.image_tag }}
          path: trivy-results.json
          retention-days: 30

      # ── Structure Tests ──────────────────────────────────────────
      - name: Install container-structure-test
        run: |
          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test

      - name: Run container structure tests
        run: |
          TEST_CONFIG="images/${{ inputs.image_path }}/test/structure.yaml"
          if [ -f "$TEST_CONFIG" ]; then
            container-structure-test test \
              --image "${{ steps.meta.outputs.full_image }}" \
              --config "$TEST_CONFIG"
          else
            echo "::notice::No structure test config at $TEST_CONFIG — skipping"
          fi

      # ── SBOM Generation ──────────────────────────────────────────
      - name: Install Syft
        uses: cascadeguard/cascadeguard-actions/setup-syft@d618b14ba0316b803ea98c1808d5b6392c97d5e1 # CAS-94
        with:
          version: v1.42.3

      - name: Generate SBOM
        run: |
          syft "${{ steps.meta.outputs.full_image }}" \
            --output spdx-json=sbom.spdx.json \
            --output cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ inputs.image_name }}-${{ inputs.image_tag }}
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json

      # ── CVE Policy Gate ──────────────────────────────────────────
      - name: Evaluate CVE policy
        run: |
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity == "Critical")] | length' grype-results.json)
          HIGH=$(jq '[.matches[] | select(.vulnerability.severity == "High")] | length' grype-results.json)
          echo "Critical: $CRITICAL, High: $HIGH"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::CVE policy violation: $CRITICAL critical vulnerabilities found"
            exit 1
          fi
          if [ "$HIGH" -gt 0 ]; then
            echo "::warning::$HIGH high vulnerabilities found in upstream base image"
          fi
          echo "CVE policy check passed."

      # ── Sign & Push ──────────────────────────────────────────────
      - name: Install Cosign
        if: inputs.push_and_sign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Push image
        id: push
        if: inputs.push_and_sign
        run: |
          docker push "${{ steps.meta.outputs.full_image }}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.meta.outputs.full_image }}" | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Sign image and attach SBOM attestation
        if: inputs.push_and_sign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ steps.meta.outputs.full_image }}"

          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "${{ steps.meta.outputs.full_image }}"

          cosign attach sbom \
            --sbom sbom.spdx.json \
            --type spdx \
            "${{ steps.meta.outputs.full_image }}"

      - name: Generate SLSA provenance attestation
        if: inputs.push_and_sign
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_PREFIX }}/${{ inputs.image_name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # ── Cleanup ──────────────────────────────────────────────────
      - name: Clean up build context
        if: always()
        run: rm -rf images/${{ inputs.image_path }}/shared
