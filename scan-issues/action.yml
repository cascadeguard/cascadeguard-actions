name: 'CascadeGuard Scan Issues'
description: 'Create or update GitHub issues from Grype/Trivy scan results'
author: 'CascadeGuard'

inputs:
  grype-results:
    description: 'Path to Grype JSON results file'
    required: false
  trivy-results:
    description: 'Path to Trivy JSON results file'
    required: false
  image:
    description: 'Image name (e.g. alpine, python-3.12-slim)'
    required: true
  tag:
    description: 'Image tag that was scanned'
    required: false
  repo:
    description: 'GitHub repository (owner/repo) for issue management'
    required: true
  github-token:
    description: 'GitHub token for creating/updating issues'
    required: true
  cascadeguard-version:
    description: 'CascadeGuard CLI version (git ref) to install'
    required: false
    default: 'main'

outputs:
  created:
    description: 'Number of new issues created'
    value: ${{ steps.issues.outputs.created }}
  updated:
    description: 'Number of existing issues updated'
    value: ${{ steps.issues.outputs.updated }}
  reopened:
    description: 'Number of closed issues reopened'
    value: ${{ steps.issues.outputs.reopened }}

runs:
  using: 'composite'
  steps:
    - name: Install CascadeGuard CLI
      shell: bash
      run: |
        pip install --quiet \
          "git+https://github.com/cascadeguard/cascadeguard.git@${{ inputs.cascadeguard-version }}#subdirectory=app"

    - name: Create or update CVE issues
      id: issues
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        ARGS=()
        if [ -n "${{ inputs.grype-results }}" ] && [ -f "${{ inputs.grype-results }}" ]; then
          ARGS+=(--grype "${{ inputs.grype-results }}")
        fi
        if [ -n "${{ inputs.trivy-results }}" ] && [ -f "${{ inputs.trivy-results }}" ]; then
          ARGS+=(--trivy "${{ inputs.trivy-results }}")
        fi

        if [ ${#ARGS[@]} -eq 0 ]; then
          echo "::error::At least one of grype-results or trivy-results must be provided"
          exit 1
        fi

        TAG_ARG=""
        if [ -n "${{ inputs.tag }}" ]; then
          TAG_ARG="--tag ${{ inputs.tag }}"
        fi

        OUTPUT=$(cascadeguard scan-issues \
          "${ARGS[@]}" \
          --image "${{ inputs.image }}" \
          $TAG_ARG \
          --repo "${{ inputs.repo }}" 2>&1) || true

        echo "$OUTPUT"

        # Parse summary line: "N created, N updated, N reopened"
        CREATED=$(echo "$OUTPUT" | grep -oP '\d+ created' | grep -oP '\d+' || echo "0")
        UPDATED=$(echo "$OUTPUT" | grep -oP '\d+ updated' | grep -oP '\d+' || echo "0")
        REOPENED=$(echo "$OUTPUT" | grep -oP '\d+ reopened' | grep -oP '\d+' || echo "0")

        echo "created=$CREATED" >> "$GITHUB_OUTPUT"
        echo "updated=$UPDATED" >> "$GITHUB_OUTPUT"
        echo "reopened=$REOPENED" >> "$GITHUB_OUTPUT"
