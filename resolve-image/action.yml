name: 'Resolve Image'
description: 'Look up an image name in images.yaml and output the resolved path, name, tag, and whether it was found'
author: 'CascadeGuard'

inputs:
  image-name:
    description: 'Image name to look up (matches the `image` field in images.yaml)'
    required: true
  image-tag:
    description: 'Override tag; if empty, uses the tag from images.yaml'
    required: false
    default: ''
  images-file:
    description: 'Path to the images manifest file'
    required: false
    default: 'images.yaml'

outputs:
  image_path:
    description: 'Derived path under images/ (e.g. python/3.12)'
    value: ${{ steps.resolve.outputs.image_path }}
  image_name:
    description: 'The resolved image name'
    value: ${{ steps.resolve.outputs.image_name }}
  image_tag:
    description: 'The resolved tag (from input override or images.yaml)'
    value: ${{ steps.resolve.outputs.image_tag }}
  found:
    description: 'true if image exists and is enabled, false otherwise'
    value: ${{ steps.resolve.outputs.found }}

runs:
  using: composite
  steps:
    - name: Resolve image from images.yaml
      id: resolve
      shell: bash
      env:
        INPUT_IMAGE_NAME: ${{ inputs.image-name }}
        INPUT_IMAGE_TAG: ${{ inputs.image-tag }}
        INPUT_IMAGES_FILE: ${{ inputs.images-file }}
        PYTHONPATH: ${{ github.action_path }}
      run: |
        python3 - <<'PYEOF'
        import yaml, os, sys
        from resolve import resolve_image

        image_name = os.environ["INPUT_IMAGE_NAME"]
        image_tag  = os.environ["INPUT_IMAGE_TAG"]
        images_file = os.environ["INPUT_IMAGES_FILE"]

        with open(images_file) as f:
            images = yaml.safe_load(f)

        result = resolve_image(images, image_name, image_tag)

        if not result["found"]:
            print(f"::error::Image '{image_name}' not found in {images_file} or is disabled.")
            with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                f.write("found=false\n")
            sys.exit(0)

        print(f"Resolved: {result['image_name']}:{result['image_tag']} at images/{result['image_path']}")

        with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"image_path={result['image_path']}\n")
            f.write(f"image_name={result['image_name']}\n")
            f.write(f"image_tag={result['image_tag']}\n")
            f.write("found=true\n")
        PYEOF
